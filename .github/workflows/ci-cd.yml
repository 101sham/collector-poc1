name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-auth:
    name: Tests Auth Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: auth-service/package-lock.json
      - run: npm ci
        working-directory: auth-service
      - run: npm test
        working-directory: auth-service
        env:
          AUTH0_DOMAIN: ${{ secrets.AUTH0_DOMAIN }}
          AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}

  test-listing:
    name: Tests Listing Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: listing-service/package-lock.json
      - run: npm ci
        working-directory: listing-service
      - run: npm test -- --coverage
        working-directory: listing-service

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm audit auth-service
        run: npm audit --audit-level=critical
        working-directory: auth-service
        continue-on-error: true
      - name: npm audit listing-service
        run: npm audit --audit-level=critical
        working-directory: listing-service
        continue-on-error: true
      - name: Trivy scan auth-service
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './auth-service'
          severity: 'CRITICAL'
          exit-code: '0'
      - name: Trivy scan listing-service
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './listing-service'
          severity: 'CRITICAL'
          exit-code: '0'

  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-auth, test-listing, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ghcr.io/${{ github.repository }}/auth-service:latest
      - name: Build listing-service
        uses: docker/build-push-action@v5
        with:
          context: ./listing-service
          push: true
          tags: ghcr.io/${{ github.repository }}/listing-service:latest
      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          build-args: |
            VITE_AUTH0_DOMAIN=${{ secrets.AUTH0_DOMAIN }}
            VITE_AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }}
            VITE_AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}